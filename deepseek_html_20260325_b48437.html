<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minimal — социальная сеть</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        // Импорт Firebase (работает только в module)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // Конфигурация Firebase (ЗАМЕНИТЕ НА СВОЮ!)
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_ПРОЕКТ.firebaseapp.com",
            projectId: "ВАШ_ПРОЕКТ",
            storageBucket: "ВАШ_ПРОЕКТ.appspot.com",
            messagingSenderId: "ВАШ_ID",
            appId: "ВАШ_APP_ID"
        };
        
        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Сохраняем глобально для доступа из других скриптов
        window.db = db;
        window.firestoreHelpers = { collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc };
        
        // Запускаем приложение после загрузки Firebase
        window.firebaseReady = true;
        if(window.initAppAfterFirebase) window.initAppAfterFirebase();
    </script>
    <style>
        /* Тот же стиль, что и в предыдущей версии */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-page: #fafafa;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --border: #e5e5e5;
            --accent: #000000;
            --like-color: #e5484d;
        }
        body.dark {
            --bg-page: #121212;
            --bg-card: #1e1e1e;
            --text-primary: #ededed;
            --text-secondary: #a3a3a3;
            --border: #2c2c2c;
            --accent: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            transition: background 0.2s;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 20px 48px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 500;
        }
        .user-badge {
            font-size: 0.85rem;
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .create-post {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .create-post textarea {
            width: 100%;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-family: inherit;
            resize: vertical;
            outline: none;
            color: var(--text-primary);
        }
        .post-btn {
            background: var(--accent);
            color: var(--bg-page);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .posts-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-content {
            margin-bottom: 14px;
            padding-left: 52px;
        }
        .post-stats {
            padding-left: 52px;
            display: flex;
            gap: 20px;
        }
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            gap: 6px;
            color: var(--text-secondary);
        }
        .like-btn.liked {
            color: var(--like-color);
        }
        .comments-section {
            padding-left: 52px;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .reply-form {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .reply-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-page);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-card);
            padding: 28px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-page);
        }
        .empty-feed {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }
        @media (max-width: 500px) {
            .post-content, .post-stats, .comments-section {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>minimal</h1>
            <p>общая лента</p>
        </div>
        <div class="user-badge" id="userBadge">👤 войти</div>
    </div>

    <div id="createPostArea" class="create-post" style="display: none;">
        <textarea id="postInput" rows="2" placeholder="что нового?"></textarea>
        <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
            <button class="post-btn" id="publishBtn">опубликовать</button>
        </div>
    </div>

    <div id="postsContainer" class="posts-feed">
        <div class="empty-feed">загружаем...</div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 id="authTitle">вход</h3>
        <input type="text" id="authLogin" placeholder="логин">
        <input type="password" id="authPassword" placeholder="пароль">
        <div id="authError" style="color:red; font-size:12px;"></div>
        <button class="post-btn" id="authSubmitBtn" style="width:100%; margin-top:8px;">войти</button>
        <div style="text-align:center; margin-top:16px; font-size:0.8rem;">
            <span id="switchAuthMode" style="cursor:pointer; text-decoration:underline;">нет аккаунта? зарегистрироваться</span>
        </div>
    </div>
</div>

<script>
    // Ждём загрузки Firebase
    let users = [];
    let currentUser = null;
    let postsUnsubscribe = null;
    
    function waitForFirebase() {
        return new Promise((resolve) => {
            if(window.firebaseReady && window.db) {
                resolve();
            } else {
                window.initAppAfterFirebase = resolve;
            }
        });
    }
    
    async function initApp() {
        await waitForFirebase();
        
        const db = window.db;
        const { collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } = window.firestoreHelpers;
        
        // Загрузка пользователей из Firestore
        async function loadUsers() {
            const usersDoc = await getDoc(doc(db, 'app_data', 'users'));
            if(usersDoc.exists()) {
                users = usersDoc.data().list || [];
            } else {
                users = [
                    { id: 'u1', login: 'alice', password: '123', name: 'Алиса', avatarInitial: 'А' },
                    { id: 'u2', login: 'mark', password: '123', name: 'Марк', avatarInitial: 'М' }
                ];
                await setDoc(doc(db, 'app_data', 'users'), { list: users });
            }
        }
        
        // Сохранение пользователей
        async function saveUsers() {
            await setDoc(doc(db, 'app_data', 'users'), { list: users });
        }
        
        await loadUsers();
        
        // Восстановление сессии
        const savedUserId = localStorage.getItem('minimal_user_id');
        if(savedUserId) {
            currentUser = users.find(u => u.id === savedUserId);
        }
        
        function formatTime(iso) {
            const date = new Date(iso);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            if(diff < 1) return 'только что';
            if(diff < 60) return `${diff} мин`;
            if(diff < 1440) return `${Math.floor(diff/60)} ч`;
            return `${Math.floor(diff/1440)} д`;
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        // Рендер ленты (реальное время!)
        function startRealtimeFeed() {
            const postsQuery = query(collection(db, 'posts'), orderBy('timestamp', 'desc'));
            postsUnsubscribe = onSnapshot(postsQuery, (snapshot) => {
                const posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                renderFeed(posts);
            });
        }
        
        function renderFeed(posts) {
            const container = document.getElementById('postsContainer');
            if(posts.length === 0) {
                container.innerHTML = '<div class="empty-feed">✨ здесь пусто. напишите первый пост</div>';
                return;
            }
            
            let html = '';
            for(let post of posts) {
                const isLiked = currentUser && post.likes && post.likes.includes(currentUser.id);
                const likeClass = isLiked ? 'liked' : '';
                const likeIcon = isLiked ? '❤️' : '🤍';
                const timeAgo = formatTime(post.timestamp);
                const comments = post.comments || [];
                
                html += `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="avatar">${escapeHtml(post.avatarInitial)}</div>
                            <div>
                                <div class="user-name">${escapeHtml(post.authorName)}</div>
                                <div class="user-handle" style="font-size:0.7rem; color:var(--text-secondary);">${escapeHtml(post.authorHandle)}</div>
                            </div>
                            <div style="margin-left:auto; font-size:0.7rem; color:var(--text-secondary);">${timeAgo}</div>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-stats">
                            <button class="like-btn ${likeClass}" data-id="${post.id}">
                                <span>${likeIcon}</span>
                                <span>${post.likes ? post.likes.length : 0}</span>
                            </button>
                            <button class="reply-btn" data-id="${post.id}">💬 ${comments.length}</button>
                        </div>
                        <div class="comments-section" id="comments-${post.id}">
                            ${comments.map(comment => `
                                <div class="comment">
                                    <div class="avatar" style="width:28px; height:28px; font-size:0.7rem;">${escapeHtml(comment.avatarInitial)}</div>
                                    <div>
                                        <div><strong>${escapeHtml(comment.authorName)}</strong> <span style="font-size:0.7rem;">${escapeHtml(comment.authorHandle)}</span></div>
                                        <div>${escapeHtml(comment.text)}</div>
                                        <div style="font-size:0.65rem; color:var(--text-secondary);">${formatTime(comment.timestamp)}</div>
                                    </div>
                                </div>
                            `).join('')}
                            <div class="reply-form" id="reply-form-${post.id}" style="display: none;">
                                <input type="text" class="reply-input" id="reply-input-${post.id}" placeholder="написать ответ...">
                                <button class="reply-send" data-id="${post.id}" style="background:var(--accent); color:var(--bg-page); border:none; padding:6px 14px; border-radius:20px;">→</button>
                            </div>
                            <button class="open-reply-btn" data-id="${post.id}" style="background:none; border:none; color:var(--text-secondary); font-size:0.7rem; cursor:pointer; margin-top:8px;">💬 ответить</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // Обработчики лайков
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(!currentUser) { alert('войдите'); openAuthModal(); return; }
                    const postId = btn.getAttribute('data-id');
                    const postRef = doc(db, 'posts', postId);
                    const postDoc = await getDoc(postRef);
                    if(postDoc.exists()) {
                        const likes = postDoc.data().likes || [];
                        if(likes.includes(currentUser.id)) {
                            await updateDoc(postRef, { likes: arrayRemove(currentUser.id) });
                        } else {
                            await updateDoc(postRef, { likes: arrayUnion(currentUser.id) });
                        }
                    }
                });
            });
            
            // Обработчики ответов
            document.querySelectorAll('.open-reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if(!currentUser) { alert('войдите'); openAuthModal(); return; }
                    const postId = btn.getAttribute('data-id');
                    const form = document.getElementById(`reply-form-${postId}`);
                    form.style.display = form.style.display === 'none' ? 'flex' : 'none';
                    if(form.style.display === 'flex') {
                        document.getElementById(`reply-input-${postId}`).focus();
                    }
                });
            });
            
            document.querySelectorAll('.reply-send').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const postId = btn.getAttribute('data-id');
                    const input = document.getElementById(`reply-input-${postId}`);
                    const text = input.value.trim();
                    if(!text) return;
                    
                    const newComment = {
                        id: Date.now() + '_' + Math.random(),
                        userId: currentUser.id,
                        authorName: currentUser.name,
                        authorHandle: '@' + currentUser.login,
                        avatarInitial: currentUser.avatarInitial,
                        text: text,
                        timestamp: new Date().toISOString()
                    };
                    
                    const postRef = doc(db, 'posts', postId);
                    const postDoc = await getDoc(postRef);
                    const comments = postDoc.data().comments || [];
                    comments.push(newComment);
                    await updateDoc(postRef, { comments: comments });
                    input.value = '';
                    document.getElementById(`reply-form-${postId}`).style.display = 'none';
                });
            });
        }
        
        // Создание поста
        async function createPost(content) {
            if(!currentUser) return;
            const postsCol = collection(db, 'posts');
            await addDoc(postsCol, {
                userId: currentUser.id,
                authorName: currentUser.name,
                authorHandle: '@' + currentUser.login,
                avatarInitial: currentUser.avatarInitial,
                content: content,
                timestamp: new Date().toISOString(),
                likes: [],
                comments: []
            });
        }
        
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const input = document.getElementById('postInput');
            const content = input.value.trim();
            if(!content) return alert('напишите что-нибудь');
            await createPost(content);
            input.value = '';
        });
        
        // Авторизация
        function openAuthModal(mode = 'login') {
            window.authMode = mode;
            const modal = document.getElementById('authModal');
            document.getElementById('authTitle').innerText = mode === 'login' ? 'вход' : 'регистрация';
            document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'войти' : 'зарегистрироваться';
            document.getElementById('switchAuthMode').innerText = mode === 'login' ? 'нет аккаунта? зарегистрироваться' : 'уже есть аккаунт? войти';
            document.getElementById('authLogin').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authError').innerText = '';
            modal.classList.add('active');
        }
        
        async function handleAuth() {
            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if(!login || !password) {
                document.getElementById('authError').innerText = 'заполните все поля';
                return;
            }
            
            if(window.authMode === 'login') {
                const user = users.find(u => u.login === login && u.password === password);
                if(user) {
                    currentUser = user;
                    localStorage.setItem('minimal_user_id', currentUser.id);
                    closeAuthModal();
                    updateUI();
                } else {
                    document.getElementById('authError').innerText = 'неверный логин или пароль';
                }
            } else {
                if(users.find(u => u.login === login)) {
                    document.getElementById('authError').innerText = 'пользователь уже существует';
                    return;
                }
                const newUser = {
                    id: 'u_' + Date.now(),
                    login: login,
                    password: password,
                    name: login.charAt(0).toUpperCase() + login.slice(1),
                    avatarInitial: login.charAt(0).toUpperCase()
                };
                users.push(newUser);
                await saveUsers();
                currentUser = newUser;
                localStorage.setItem('minimal_user_id', currentUser.id);
                closeAuthModal();
                updateUI();
            }
        }
        
        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }
        
        function updateUI() {
            const createArea = document.getElementById('createPostArea');
            const userBadge = document.getElementById('userBadge');
            if(currentUser) {
                createArea.style.display = 'block';
                userBadge.innerHTML = `👤 ${escapeHtml(currentUser.login)}`;
            } else {
                createArea.style.display = 'none';
                userBadge.innerHTML = `👤 войти`;
            }
        }
        
        document.getElementById('userBadge').addEventListener('click', () => {
            if(currentUser) {
                if(confirm('выйти?')) {
                    currentUser = null;
                    localStorage.removeItem('minimal_user_id');
                    updateUI();
                }
            } else {
                openAuthModal('login');
            }
        });
        
        document.getElementById('authSubmitBtn').addEventListener('click', handleAuth);
        document.getElementById('switchAuthMode').addEventListener('click', () => {
            const newMode = window.authMode === 'login' ? 'register' : 'login';
            openAuthModal(newMode);
        });
        document.getElementById('authModal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('authModal')) closeAuthModal();
        });
        
        updateUI();
        startRealtimeFeed();
    }
    
    initApp();
</script>
</body>
</html>
