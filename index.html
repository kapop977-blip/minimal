<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>minimal — социальная сеть</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #fafafa;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --border: #e5e5e5;
            --accent: #000000;
            --accent-hover: #333333;
            --like-color: #e5484d;
            --reply-hover: #f0f0f0;
        }

        body.dark {
            --bg-page: #121212;
            --bg-card: #1e1e1e;
            --text-primary: #ededed;
            --text-secondary: #a3a3a3;
            --border: #2c2c2c;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --like-color: #ff6b6b;
            --reply-hover: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 20px 48px;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: var(--text-secondary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .user-badge {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-page);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .modal-content input:focus {
            border-color: var(--accent);
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--bg-page);
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .modal-btn:hover {
            opacity: 0.85;
        }

        .switch-modal {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .switch-modal span {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-msg {
            color: #e5484d;
            font-size: 0.75rem;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        /* настройки темы */
        .settings-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .theme-toggle {
            display: flex;
            gap: 8px;
            background: var(--bg-page);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .theme-option {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 30px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .theme-option.active {
            background: var(--accent);
            color: var(--bg-page);
        }

        /* создание поста */
        .create-post {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .create-post textarea {
            width: 100%;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
            color: var(--text-primary);
        }

        .create-post textarea::placeholder {
            color: var(--text-secondary);
        }

        .post-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .post-btn {
            background: var(--accent);
            color: var(--bg-page);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        /* лента */
        .posts-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            transition: 0.1s;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-handle {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .post-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .post-content {
            font-size: 0.9rem;
            margin-bottom: 14px;
            word-break: break-word;
            white-space: pre-wrap;
            padding-left: 52px;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            padding-left: 52px;
            align-items: center;
            margin-bottom: 12px;
        }

        .like-btn, .reply-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.1s;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .like-btn:hover, .reply-btn:hover {
            background: var(--reply-hover);
        }

        .like-btn.liked {
            color: var(--like-color);
        }

        /* комментарии */
        .comments-section {
            padding-left: 52px;
            margin-top: 8px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.75rem;
        }

        .comment-text {
            color: var(--text-primary);
            margin-top: 2px;
            word-break: break-word;
        }

        .comment-time {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .reply-form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            align-items: flex-start;
        }

        .reply-input {
            flex: 1;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.8rem;
            color: var(--text-primary);
            outline: none;
        }

        .reply-input:focus {
            border-color: var(--accent);
        }

        .reply-send {
            background: var(--accent);
            color: var(--bg-page);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .show-replies {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            padding: 4px 0;
        }

        .empty-feed {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        @media (max-width: 500px) {
            .container {
                padding: 16px;
            }
            .post-content, .post-stats, .comments-section {
                padding-left: 0;
            }
            .post-header {
                flex-wrap: wrap;
            }
            .post-time {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>minimal</h1>
            <p>тихая лента</p>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="settingsBtn">⚙️</button>
            <div class="user-badge" id="userBadge">👤 войти</div>
        </div>
    </div>

    <!-- панель настроек (тема) -->
    <div id="settingsPanel" class="settings-panel" style="display: none;">
        <div class="settings-row">
            <span class="settings-label">🌓 тема</span>
            <div class="theme-toggle">
                <span class="theme-option" data-theme="light">светлая</span>
                <span class="theme-option" data-theme="dark">темная</span>
            </div>
        </div>
    </div>

    <!-- форма поста (показывается только авторизованным) -->
    <div id="createPostArea" class="create-post" style="display: none;">
        <textarea id="postInput" rows="2" placeholder="что нового?"></textarea>
        <div class="post-actions">
            <button class="post-btn" id="publishBtn">опубликовать</button>
        </div>
    </div>

    <!-- лента -->
    <div id="postsContainer" class="posts-feed">
        <div class="empty-feed">загружаем...</div>
    </div>
    <footer>minimal — только мысли</footer>
</div>

<!-- модалка авторизации/регистрации -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 id="authTitle">вход</h3>
        <input type="text" id="authLogin" placeholder="логин" autocomplete="off">
        <input type="password" id="authPassword" placeholder="пароль">
        <div id="authError" class="error-msg"></div>
        <button class="modal-btn" id="authSubmitBtn">войти</button>
        <div class="switch-modal">
            <span id="switchAuthMode">нет аккаунта? зарегистрироваться</span>
        </div>
    </div>
</div>

<script>
    // ----- ХРАНИЛИЩЕ -----
    let users = [];
    let currentUser = null;
    let posts = [];
    let currentTheme = 'light';

    // инициализация демо-данных
    function initDemoData() {
        const savedUsers = localStorage.getItem('minimal_users');
        if(savedUsers) {
            users = JSON.parse(savedUsers);
        } else {
            users = [
                { id: 'u1', login: 'alice', password: '123', name: 'Алиса', avatarInitial: 'А' },
                { id: 'u2', login: 'mark', password: '123', name: 'Марк', avatarInitial: 'М' }
            ];
        }

        const savedPosts = localStorage.getItem('minimal_posts');
        if(savedPosts) {
            posts = JSON.parse(savedPosts);
        } else {
            const now = new Date();
            posts = [
                {
                    id: 'p1',
                    userId: 'u1',
                    authorName: 'Алиса',
                    authorHandle: '@alice',
                    avatarInitial: 'А',
                    content: 'тишина — лучший звук. иногда просто сижу и слушаю.',
                    timestamp: new Date(now - 1000*60*30).toISOString(),
                    likes: [],
                    comments: []
                },
                {
                    id: 'p2',
                    userId: 'u2',
                    authorName: 'Марк',
                    authorHandle: '@mark',
                    avatarInitial: 'М',
                    content: 'минимализм — это не отсутствие, а точность. что думаете?',
                    timestamp: new Date(now - 1000*60*120).toISOString(),
                    likes: ['u1'],
                    comments: [
                        {
                            id: 'c1',
                            userId: 'u1',
                            authorName: 'Алиса',
                            authorHandle: '@alice',
                            avatarInitial: 'А',
                            text: 'полностью согласна! меньше — значит лучше.',
                            timestamp: new Date(now - 1000*60*60).toISOString()
                        }
                    ]
                }
            ];
        }
        saveData();
    }

    function saveData() {
        localStorage.setItem('minimal_users', JSON.stringify(users));
        localStorage.setItem('minimal_posts', JSON.stringify(posts));
        if(currentUser) {
            localStorage.setItem('minimal_current_session', currentUser.id);
        } else {
            localStorage.removeItem('minimal_current_session');
        }
    }

    function loadSession() {
        const sessionId = localStorage.getItem('minimal_current_session');
        if(sessionId) {
            const found = users.find(u => u.id === sessionId);
            if(found) currentUser = found;
        }
    }

    function formatTime(iso) {
        const date = new Date(iso);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000 / 60);
        if(diff < 1) return 'только что';
        if(diff < 60) return `${diff} мин`;
        if(diff < 1440) return `${Math.floor(diff/60)} ч`;
        return `${Math.floor(diff/1440)} д`;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // рендер комментариев для поста
    function renderComments(post, postId, showComments) {
        if(!post.comments || post.comments.length === 0) {
            return `<button class="show-replies" data-post="${postId}">💬 ответить</button>`;
        }

        let commentsHtml = '';
        const commentsToShow = showComments ? post.comments : post.comments.slice(0, 2);
        for(let comment of commentsToShow) {
            commentsHtml += `
                <div class="comment">
                    <div class="comment-avatar">${escapeHtml(comment.avatarInitial)}</div>
                    <div class="comment-content">
                        <div class="comment-author">${escapeHtml(comment.authorName)} <span style="font-weight:normal; color:var(--text-secondary);">${escapeHtml(comment.authorHandle)}</span></div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-time">${formatTime(comment.timestamp)}</div>
                    </div>
                </div>
            `;
        }

        const hasMore = post.comments.length > 2 && !showComments;
        if(hasMore) {
            commentsHtml += `<button class="show-replies" data-post="${postId}" data-expand="true">💬 показать все (${post.comments.length})</button>`;
        } else if(post.comments.length > 2 && showComments) {
            commentsHtml += `<button class="show-replies" data-post="${postId}" data-collapse="true">💬 свернуть</button>`;
        } else {
            commentsHtml += `<button class="show-replies" data-post="${postId}">💬 ответить</button>`;
        }

        commentsHtml += `
            <div class="reply-form" id="reply-form-${postId}" style="display: none;">
                <input type="text" class="reply-input" id="reply-input-${postId}" placeholder="написать ответ...">
                <button class="reply-send" data-post="${postId}">→</button>
            </div>
        `;

        return commentsHtml;
    }

    // состояние раскрытых комментариев
    let expandedComments = {};

    function renderFeed() {
        const container = document.getElementById('postsContainer');
        if(!container) return;

        if(posts.length === 0) {
            container.innerHTML = '<div class="empty-feed">✨ здесь пусто. напишите первый пост</div>';
            return;
        }

        const sorted = [...posts].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        let html = '';
        for(let post of sorted) {
            const isLiked = currentUser && post.likes.includes(currentUser.id);
            const likeClass = isLiked ? 'liked' : '';
            const likeIcon = isLiked ? '❤️' : '🤍';
            const timeAgo = formatTime(post.timestamp);
            const showComments = expandedComments[post.id] || false;
            
            html += `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="avatar">${escapeHtml(post.avatarInitial)}</div>
                        <div>
                            <div class="user-name">${escapeHtml(post.authorName)}</div>
                            <div class="user-handle">${escapeHtml(post.authorHandle)}</div>
                        </div>
                        <div class="post-time">${timeAgo}</div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-stats">
                        <button class="like-btn ${likeClass}" data-id="${post.id}">
                            <span>${likeIcon}</span>
                            <span class="like-count">${post.likes.length}</span>
                        </button>
                        <button class="reply-btn" data-id="${post.id}" data-reply="open">
                            💬 <span>${post.comments ? post.comments.length : 0}</span>
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        ${renderComments(post, post.id, showComments)}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // обработчики лайков
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(!currentUser) {
                    alert('войдите, чтобы ставить лайки');
                    openAuthModal();
                    return;
                }
                const postId = btn.getAttribute('data-id');
                const post = posts.find(p => p.id === postId);
                if(post) {
                    const idx = post.likes.indexOf(currentUser.id);
                    if(idx === -1) {
                        post.likes.push(currentUser.id);
                    } else {
                        post.likes.splice(idx, 1);
                    }
                    saveData();
                    renderFeed();
                }
            });
        });

        // обработчики кнопок ответить (открыть форму)
        document.querySelectorAll('.reply-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(!currentUser) {
                    alert('войдите, чтобы отвечать');
                    openAuthModal();
                    return;
                }
                const postId = btn.getAttribute('data-id');
                const replyForm = document.getElementById(`reply-form-${postId}`);
                if(replyForm) {
                    const isVisible = replyForm.style.display === 'flex';
                    replyForm.style.display = isVisible ? 'none' : 'flex';
                    if(!isVisible) {
                        const input = document.getElementById(`reply-input-${postId}`);
                        if(input) input.focus();
                    }
                }
            });
        });

        // обработчики отправки комментария
        document.querySelectorAll('.reply-send').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = btn.getAttribute('data-post');
                const input = document.getElementById(`reply-input-${postId}`);
                const text = input.value.trim();
                if(!text) return;
                if(!currentUser) {
                    alert('войдите, чтобы отвечать');
                    return;
                }
                const post = posts.find(p => p.id === postId);
                if(post) {
                    const newComment = {
                        id: Date.now() + '_' + Math.random(),
                        userId: currentUser.id,
                        authorName: currentUser.name,
                        authorHandle: '@' + currentUser.login,
                        avatarInitial: currentUser.avatarInitial,
                        text: text,
                        timestamp: new Date().toISOString()
                    };
                    if(!post.comments) post.comments = [];
                    post.comments.push(newComment);
                    saveData();
                    input.value = '';
                    const replyForm = document.getElementById(`reply-form-${postId}`);
                    if(replyForm) replyForm.style.display = 'none';
                    renderFeed();
                }
            });
        });

        // обработчики показа/скрытия комментариев
        document.querySelectorAll('.show-replies').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = btn.getAttribute('data-post');
                if(btn.getAttribute('data-expand') === 'true') {
                    expandedComments[postId] = true;
                    renderFeed();
                } else if(btn.getAttribute('data-collapse') === 'true') {
                    expandedComments[postId] = false;
                    renderFeed();
                } else {
                    // просто открыть форму ответа
                    const replyForm = document.getElementById(`reply-form-${postId}`);
                    if(replyForm) {
                        const isVisible = replyForm.style.display === 'flex';
                        replyForm.style.display = isVisible ? 'none' : 'flex';
                        if(!isVisible) {
                            const input = document.getElementById(`reply-input-${postId}`);
                            if(input) input.focus();
                        }
                    }
                }
            });
        });
    }

    function updateUIForAuth() {
        const createArea = document.getElementById('createPostArea');
        const userBadge = document.getElementById('userBadge');
        if(currentUser) {
            createArea.style.display = 'block';
            userBadge.innerHTML = `👤 ${escapeHtml(currentUser.login)}`;
        } else {
            createArea.style.display = 'none';
            userBadge.innerHTML = `👤 войти`;
        }
        renderFeed();
    }

    function publishPost() {
        if(!currentUser) {
            alert('нужно войти');
            openAuthModal();
            return;
        }
        const input = document.getElementById('postInput');
        const content = input.value.trim();
        if(content === '') {
            alert('напишите что-нибудь');
            return;
        }
        if(content.length > 500) {
            alert('максимум 500 символов');
            return;
        }
        const newPost = {
            id: Date.now() + '_' + Math.random().toString(36),
            userId: currentUser.id,
            authorName: currentUser.name,
            authorHandle: '@' + currentUser.login,
            avatarInitial: currentUser.avatarInitial,
            content: content,
            timestamp: new Date().toISOString(),
            likes: [],
            comments: []
        };
        posts.unshift(newPost);
        saveData();
        input.value = '';
        renderFeed();
    }

    let authMode = 'login';

    function openAuthModal(mode = 'login') {
        authMode = mode;
        const modal = document.getElementById('authModal');
        const title = document.getElementById('authTitle');
        const submitBtn = document.getElementById('authSubmitBtn');
        const switchText = document.getElementById('switchAuthMode');
        document.getElementById('authError').innerText = '';
        document.getElementById('authLogin').value = '';
        document.getElementById('authPassword').value = '';

        if(mode === 'login') {
            title.innerText = 'вход';
            submitBtn.innerText = 'войти';
            switchText.innerText = 'нет аккаунта? зарегистрироваться';
        } else {
            title.innerText = 'регистрация';
            submitBtn.innerText = 'зарегистрироваться';
            switchText.innerText = 'уже есть аккаунт? войти';
        }
        modal.classList.add('active');
    }

    function closeAuthModal() {
        document.getElementById('authModal').classList.remove('active');
    }

    function handleAuthSubmit() {
        const login = document.getElementById('authLogin').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        const errorDiv = document.getElementById('authError');

        if(!login || !password) {
            errorDiv.innerText = 'заполните все поля';
            return;
        }

        if(authMode === 'login') {
            const user = users.find(u => u.login === login && u.password === password);
            if(user) {
                currentUser = user;
                saveData();
                closeAuthModal();
                updateUIForAuth();
            } else {
                errorDiv.innerText = 'неверный логин или пароль';
            }
        } else {
            if(users.find(u => u.login === login)) {
                errorDiv.innerText = 'пользователь уже существует';
                return;
            }
            const newUser = {
                id: 'u_' + Date.now() + '_' + Math.random(),
                login: login,
                password: password,
                name: login.charAt(0).toUpperCase() + login.slice(1),
                avatarInitial: login.charAt(0).toUpperCase()
            };
            users.push(newUser);
            currentUser = newUser;
            saveData();
            closeAuthModal();
            updateUIForAuth();
        }
    }

    function applyTheme(theme) {
        currentTheme = theme;
        if(theme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        localStorage.setItem('minimal_theme', theme);
        const options = document.querySelectorAll('.theme-option');
        options.forEach(opt => {
            if(opt.getAttribute('data-theme') === theme) opt.classList.add('active');
            else opt.classList.remove('active');
        });
    }

    function initTheme() {
        const saved = localStorage.getItem('minimal_theme');
        if(saved === 'dark') applyTheme('dark');
        else applyTheme('light');
    }

    // настройки панель
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    let settingsVisible = false;
    settingsBtn.addEventListener('click', () => {
        settingsVisible = !settingsVisible;
        settingsPanel.style.display = settingsVisible ? 'block' : 'none';
    });

    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            const theme = opt.getAttribute('data-theme');
            applyTheme(theme);
        });
    });

    document.getElementById('userBadge').addEventListener('click', () => {
        if(currentUser) {
            if(confirm('выйти из аккаунта?')) {
                currentUser = null;
                localStorage.removeItem('minimal_current_session');
                expandedComments = {};
                updateUIForAuth();
            }
        } else {
            openAuthModal('login');
        }
    });

    document.getElementById('authSubmitBtn').addEventListener('click', handleAuthSubmit);
    document.getElementById('switchAuthMode').addEventListener('click', () => {
        const newMode = authMode === 'login' ? 'register' : 'login';
        openAuthModal(newMode);
    });
    document.getElementById('authModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('authModal')) closeAuthModal();
    });

    document.getElementById('publishBtn').addEventListener('click', publishPost);

    const postInput = document.getElementById('postInput');
    if(postInput) {
        postInput.addEventListener('keydown', (e) => {
            if(e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                publishPost();
            }
        });
    }

    initDemoData();
    loadSession();
    initTheme();
    updateUIForAuth();
</script>
</body>
</html>
